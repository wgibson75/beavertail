included:
  - BeaverTail

excluded: []

# ── Structural limits ─────────────────────────────────────────────────────────
# BeaverTail contains several large, performance-critical files (log viewer,
# content indexer, view model) whose size is inherent to the domain, not a
# code-quality problem.
file_length:
  warning: 1400
  error: 1600

type_body_length:
  warning: 1100
  error: 1200

function_body_length:
  warning: 200
  error: 250

cyclomatic_complexity:
  warning: 40
  error: 60

# ── Line length ───────────────────────────────────────────────────────────────
line_length:
  warning: 160
  error: 250
  ignores_comments: true
  ignores_urls: true

# ── Identifier names ──────────────────────────────────────────────────────────
# Single-letter and two-letter identifiers are idiomatic in byte-level
# performance code (loop indices, pointer variables, math helpers).
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - i
    - j
    - k
    - n
    - p
    - r
    - a
    - b
    - c
    - e
    - f
    - s
    - v
    - lo
    - hi
    - rx
    - tv
    - sv
    - dt
    - ms
    - t0
    - bm
    - fh
    - el
    - nl
    - no
    - ki
    - ji
    - cs
    - ce
    - bp
    - lb
    - ch
    - id
    - x
    - y

# ── Rules disabled for this codebase ─────────────────────────────────────────
disabled_rules:
  # for_where: the inner-if pattern is used intentionally in several
  # performance-critical loops where the body is more than a single statement.
  - for_where
  # multiple_closures_with_trailing_closure: SwiftUI requires trailing-closure
  # syntax for onChange/onReceive with multiple arguments.
  - multiple_closures_with_trailing_closure
  # optional_data_string_conversion: String(decoding:as:) is used throughout
  # for performance; the failable initialiser is not needed here.
  - optional_data_string_conversion
  # orphaned_doc_comment: some /// comments intentionally describe a following
  # block rather than a declaration.
  - orphaned_doc_comment
